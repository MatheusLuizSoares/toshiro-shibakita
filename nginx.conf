events {
    worker_connections 1024;
}

http {

    # Grupo de servidores
    upstream all {

        # Balanceamento inteligente
        least_conn;

        # Servidores backend
        server 172.31.0.37:80 max_fails=3 fail_timeout=30s;
        server 172.31.0.151:80 max_fails=3 fail_timeout=30s;
        server 172.31.0.149:80 max_fails=3 fail_timeout=30s;

        # Mantém conexões abertas
        keepalive 32;
    }

    server {

        # Porta do proxy
        listen 4500;

        # Nome do servidor
        server_name localhost;

        location / {

            # Encaminha para o cluster
            proxy_pass http://all;

            # Headers importantes
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # HTTP 1.1
            proxy_http_version 1.1;

            # Keepalive
            proxy_set_header Connection "";
        }

        # Página simples de status
        location /nginx_status {
            stub_status;
            allow 127.0.0.1;
            deny all;
        }
    }
}